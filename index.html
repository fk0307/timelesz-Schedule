<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#e7d9c4">
  <meta name="color-scheme" content="only light">
  <title>timelesz Schedule</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="kicker">FAN SCHEDULE</p>
        <h1>timelesz Schedule</h1>
      </div>
      <button id="todayBtn" class="today-btn" type="button" aria-label="今日の月へ移動">
        <span data-icon="calendar"></span><span>今日</span>
      </button>
    </header>

    <section class="panel controls">
      <label class="search">
        <span data-icon="search"></span>
        <input id="searchInput" type="search" placeholder="番組名・雑誌名などを検索">
      </label>
      <p class="section-label">MEMBER</p>
      <div id="memberFilters" class="scroll-row"></div>
      <p class="section-label">CATEGORY</p>
      <div id="categoryFilters" class="scroll-row"></div>
    </section>

    <section class="panel calendar-panel">
      <div class="month-nav">
        <button id="prevMonth" class="icon-btn" type="button" aria-label="前の月"><span data-icon="chevron-left"></span></button>
        <div>
          <div id="monthLabel" class="month-label"></div>
          <div id="countLabel" class="count-label"></div>
        </div>
        <button id="nextMonth" class="icon-btn" type="button" aria-label="次の月"><span data-icon="chevron-right"></span></button>
      </div>
      <div class="weekdays">
        <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
      </div>
      <div id="loadingState" class="loading-state">予定を読み込んでいます…</div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    <footer class="site-footer">
      <div id="totalEvents">全0件</div>
      <div class="version-info">Ver.1.9 <span>最終更新 2026.07.14 19:47</span></div>
      <div id="dataWarnings" class="data-warnings"></div>
    </footer>
  </div>

  <dialog id="eventDialog">
    <div class="dialog-head">
      <div>
        <p class="kicker">SCHEDULE</p>
        <h2 id="dialogDate"></h2>
      </div>
      <button id="closeDialog" class="icon-btn" type="button" aria-label="閉じる"><span data-icon="x"></span></button>
    </div>
    <div id="dialogEvents" class="dialog-events"></div>
  </dialog>

  <script src="fallback-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
