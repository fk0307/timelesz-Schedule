<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="only light">
  <title>timelesz Schedule 管理チェック</title>
  <style>
    :root{color-scheme:only light;--theme:#e7d9c4;--page:#f4ede3;--surface:#fffaf3;--ink:#49372c;--muted:#7e6a5a;--line:#cfbda4;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink)}main{max-width:880px;margin:auto;padding:20px 12px 40px}h1{margin:0 0 4px;font-size:26px}.sub{margin:0 0 18px;color:var(--muted);font-size:13px}.card{margin-bottom:12px;padding:15px;background:var(--theme);border:1px solid rgba(105,76,46,.14);border-radius:18px}.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.stat{padding:13px;background:var(--surface);border:1px solid var(--line);border-radius:12px}.stat b{display:block;font-size:24px}.stat span{color:var(--muted);font-size:11px}.status{padding:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;line-height:1.6;font-size:13px}.issues{margin:10px 0 0;padding-left:20px;font-size:13px;line-height:1.7}.ok{color:#45643f}.warn{color:#965942}.back{display:inline-block;margin-top:6px;color:var(--ink)}@media(max-width:520px){.stats{grid-template-columns:1fr}.stat b{font-size:20px}}
  </style>
</head>
<body>
<main>
  <h1>管理チェック</h1>
  <p class="sub">公開ページからはリンクしていない運営確認用ページです。</p>
  <section class="card">
    <div class="stats">
      <div class="stat"><b id="total">—</b><span>全データ</span></div>
      <div class="stat"><b id="publicCount">—</b><span>公開データ</span></div>
      <div class="stat"><b id="issueCount">—</b><span>確認項目</span></div>
    </div>
  </section>
  <section class="card">
    <div id="status" class="status">スプレッドシートを確認しています…</div>
    <ul id="issues" class="issues"></ul>
  </section>
  <a class="back" href="index.html">← 公開ページへ戻る</a>
</main>
<script>
const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT8yHpEmpNIWvi6FIo1ntB-tG_xjze0EE297G94Hp37vIsCH3QntRiUOo39_B5Ocg/pub?gid=1610754135&single=true&output=csv";
const validCategories=new Set(["TV","RADIO","MAGAZINE","CONCERT","EVENT","RELEASE","MOVIE","BIRTHDAY","YOUTUBE"]);
function parseCSV(text){const rows=[];let row=[],value="",quoted=false;for(let i=0;i<text.length;i++){const c=text[i];if(c==='"'){if(quoted&&text[i+1]==='"'){value+='"';i++;}else quoted=!quoted;}else if(c===','&&!quoted){row.push(value);value="";}else if((c==='\n'||c==='\r')&&!quoted){if(c==='\r'&&text[i+1]==='\n')i++;row.push(value);value="";if(row.some(v=>v!==""))rows.push(row);row=[];}else value+=c;}if(value.length||row.length){row.push(value);rows.push(row);}return rows;}
(async()=>{try{const res=await fetch(`${CSV_URL}&t=${Date.now()}`,{cache:"no-store"});if(!res.ok)throw new Error(`HTTP ${res.status}`);const rows=parseCSV(await res.text());const headers=(rows.shift()||[]).map(v=>v.trim().toLowerCase());const data=rows.map(row=>Object.fromEntries(headers.map((h,i)=>[h,(row[i]||"").trim()])));const issues=[];const seen=new Set();data.forEach((r,i)=>{const n=i+2;if(!/^\d{4}[-/.]\d{1,2}[-/.]\d{1,2}/.test(r.date||""))issues.push(`${n}行目：日付を確認`);if(!validCategories.has((r.category||"").toUpperCase()))issues.push(`${n}行目：カテゴリーを確認`);if(!(r.title||""))issues.push(`${n}行目：タイトルが空欄`);if(!(r.members||""))issues.push(`${n}行目：メンバーが空欄`);if(r.url&&!/^https?:\/\//i.test(r.url))issues.push(`${n}行目：URL形式を確認`);const key=`${r.date}|${r.time}|${r.title}`;if(seen.has(key))issues.push(`${n}行目：重複の可能性`);seen.add(key);});const publicData=data.filter(r=>r.status!=="非公開");document.getElementById('total').textContent=data.length;document.getElementById('publicCount').textContent=publicData.length;document.getElementById('issueCount').textContent=issues.length;const status=document.getElementById('status');status.textContent=issues.length?`確認が必要な項目が${issues.length}件あります。`:'入力上の問題は見つかりませんでした。';status.classList.add(issues.length?'warn':'ok');document.getElementById('issues').innerHTML=issues.slice(0,100).map(v=>`<li>${v}</li>`).join('');}catch(e){document.getElementById('status').textContent='読み込みに失敗しました。スプレッドシートの公開設定と通信状態を確認してください。';document.getElementById('status').classList.add('warn');}})();
</script>
</body>
</html>
